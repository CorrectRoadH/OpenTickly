[project]
name = "opentoggl"

[lint]
default_level = "warn"
changed_base = "origin/main"
cache = true

[rules]
local = ["rules"]

[packs]
go = "github:CorrectRoadH/harness-lint@main#packs/go"
go-concurrency = "github:CorrectRoadH/harness-lint@main#packs/go-concurrency"
go-effective-go = "github:CorrectRoadH/harness-lint@main#packs/go-effective-go"
typescript = "github:CorrectRoadH/harness-lint@main#packs/typescript"
typescript-react = "github:CorrectRoadH/harness-lint@main#packs/typescript-react"

[overrides]

[disabled]
rules = [
  "typescript.no-var",
  # Generic pack rules below are not adopted as repository policy yet. Keep
  # them disabled instead of hiding whole production directories with path
  # ignores; replace them with narrower local rules before enabling.
  "go-concurrency.no-background-context-flow",
  "go-concurrency.no-time-after-loop",
  "go-concurrency.no-untracked-goroutine",
  "go-effective-go.no-blank-placeholder-assignment",
  "go-effective-go.no-ignored-error-blank",
  "go-effective-go.no-nil-nil-return",
  "go-effective-go.no-panic-flow",
  "go.no-panic-flow",
  "go.no-process-exit-flow",
  "typescript-react.no-clone-element",
  "typescript-react.no-dangerous-html",
  "typescript.no-console-log",
]

[ignore]
paths = [
  "apps/backend/internal/http/generated/**",
  "apps/update-worker/src/content.generated.ts",
  "apps/website/src/shared/api/generated/**",
  "packages/shared-contracts/src/generated/**",
  "tests/python-sdk-integration/**",
]

[registry]
url = "https://raw.githubusercontent.com/CorrectRoadH/harness-lint/main/site/catalog.json"
