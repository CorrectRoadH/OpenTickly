# yaml-language-server: $schema=https://schema.zeabur.app/template.json
apiVersion: zeabur.com/v1
kind: Template
metadata:
  name: OpenTickly
spec:
  description: |
    A free, private-first, AI-friendly self-hosted alternative to Toggl Track. Compatible with Toggl Track v9 and Reports v3 APIs so you can move data in and out without any loss.
  icon: https://raw.githubusercontent.com/CorrectRoadH/OpenTickly/main/apps/website/public/favicon.svg
  coverImage: https://raw.githubusercontent.com/CorrectRoadH/OpenTickly/main/apps/landing/public/hero/opentoggl-calendar-view.webp
  tags:
    - Productivity
    - Tool
  variables:
    - key: PUBLIC_DOMAIN
      type: DOMAIN
      name: Public Domain
      description: The public domain used to access OpenTickly from your browser and the toggl-cli.
  readme: |
    # OpenTickly on Zeabur

    [OpenTickly](https://github.com/CorrectRoadH/OpenTickly) is a free, private-first, AI-friendly alternative to Toggl Track. Bring your own data, keep your existing Toggl workflow, and pay only for what you host.

    This template provisions everything you need in one click:

    - **opentoggl** — single-image runtime that serves both the web UI and the API on port 8080
    - **postgres** — PostgreSQL 17 for primary storage, with a persistent volume
    - **redis** — Redis 8 for cache and the background job queue

    ## After deployment

    1. Wait until all three services report healthy in the dashboard.
    2. Open the public domain you bound during deployment.
    3. Sign up the first account — it becomes the workspace owner.
    4. (Optional) Point [`toggl-cli`](https://github.com/CorrectRoadH/toggl-cli) at your instance for AI-driven time tracking.

    ## Custom domain

    Bind your own domain in the **Networking** tab of the `opentoggl` service after deployment. The web UI is also an installable Progressive Web App on iOS and Android.

    ## Updates

    To upgrade, change the image tag of the `opentoggl` service to a newer release from
    [GHCR](https://github.com/CorrectRoadH/OpenTickly/pkgs/container/opentoggl) and redeploy.

    ## License & attribution

    OpenTickly is licensed under [AGPL v3](https://www.gnu.org/licenses/agpl-3.0).
    Source: <https://github.com/CorrectRoadH/OpenTickly> · Website: <https://opentoggl.com>.
    OpenTickly's design and API surface are inspired by [Toggl](https://toggl.com).
  services:
    - name: postgresql
      icon: https://raw.githubusercontent.com/zeabur/service-icons/main/marketplace/postgresql.svg
      template: PREBUILT_V2
      spec:
        source:
          image: postgres:17-alpine
        ports:
          - id: database
            port: 5432
            type: TCP
        portForwarding:
          enabled: false
        healthCheck:
          type: TCP
          port: database
        volumes:
          - id: data
            dir: /var/lib/postgresql/data
        env:
          POSTGRES_DB:
            default: opentoggl
            expose: true
            readonly: true
          POSTGRES_USER:
            default: postgres
            expose: true
            readonly: true
          POSTGRES_PASSWORD:
            default: ${PASSWORD}
            expose: true
          POSTGRES_HOST:
            default: ${CONTAINER_HOSTNAME}
            expose: true
            readonly: true
          POSTGRES_PORT:
            default: "5432"
            expose: true
            readonly: true
          POSTGRES_CONNECTION_STRING:
            default: postgres://postgres:${PASSWORD}@${CONTAINER_HOSTNAME}:5432/opentoggl?sslmode=disable
            expose: true
            readonly: true

    - name: redis
      icon: https://raw.githubusercontent.com/zeabur/service-icons/main/marketplace/redis.svg
      template: PREBUILT_V2
      spec:
        source:
          image: redis:8-alpine
          command:
            - redis-server
            - --save
            - ""
            - --appendonly
            - "no"
            - --requirepass
            - ${PASSWORD}
        ports:
          - id: redis
            port: 6379
            type: TCP
        portForwarding:
          enabled: false
        healthCheck:
          type: TCP
          port: redis
        env:
          REDIS_PASSWORD:
            default: ${PASSWORD}
            expose: true
          REDIS_HOST:
            default: ${CONTAINER_HOSTNAME}
            expose: true
            readonly: true
          REDIS_PORT:
            default: "6379"
            expose: true
            readonly: true
          REDIS_CONNECTION_STRING:
            default: redis://:${PASSWORD}@${CONTAINER_HOSTNAME}:6379/0
            expose: true
            readonly: true

    - name: opentoggl
      icon: https://raw.githubusercontent.com/CorrectRoadH/OpenTickly/main/apps/website/public/favicon.svg
      template: PREBUILT_V2
      dependencies:
        - postgresql
        - redis
      domainKey: PUBLIC_DOMAIN
      spec:
        source:
          image: correctroad/opentoggl:0.2
          command:
            - /bin/sh
            - -c
            - |
              # Zeabur's `dependencies` only controls start order, not readiness.
              # opentoggl does a strict 3s ping of postgres+redis at startup and
              # exits if either is not yet accepting connections. Wrap the binary
              # in a retry loop so the first attempt does not look like an error.
              n=0
              while ! /usr/local/bin/opentoggl serve; do
                n=$((n+1))
                if [ "$n" -ge 30 ]; then
                  echo "[startup] giving up after $n attempts" >&2
                  exit 1
                fi
                echo "[startup] attempt $n failed, retry in 2s (likely waiting for postgres/redis to accept connections)" >&2
                sleep 2
              done
        ports:
          - id: web
            port: 8080
            type: HTTP
        healthCheck:
          type: TCP
          port: web
        env:
          OPENTOGGL_SERVICE_NAME:
            default: opentoggl
          PORT:
            default: "8080"
          DATABASE_URL:
            default: ${POSTGRES_CONNECTION_STRING}
            readonly: true
          REDIS_URL:
            default: ${REDIS_CONNECTION_STRING}
            readonly: true
          OPENTOGGL_FILESTORE_NAMESPACE:
            default: opentoggl
          OPENTOGGL_JOBS_QUEUE_NAME:
            default: default

localization:
  zh-TW:
    description: |
      免費、隱私優先、對 AI 友善的自託管 Toggl Track 替代方案。完整相容 Toggl Track v9 與 Reports v3 API,可無損將資料在兩者之間遷移。
    variables:
      - key: PUBLIC_DOMAIN
        name: 公開網域
        description: 用來透過瀏覽器及 toggl-cli 存取 OpenTickly 的公開網域。
    readme: |
      # OpenTickly on Zeabur

      [OpenTickly](https://github.com/CorrectRoadH/OpenTickly) 是一款免費、隱私優先、對 AI 友善的 Toggl Track 替代方案。資料完全屬於你,既能保留現有的 Toggl 工作流程,又只需支付實際自託管的成本。

      此模板將一鍵部署所需的全部服務:

      - **opentoggl** — 單一映像,在 8080 連接埠同時提供 Web UI 與 API
      - **postgres** — PostgreSQL 17 主資料庫,附持久化儲存區
      - **redis** — Redis 8,用於快取與背景任務佇列

      ## 部署完成之後

      1. 等待三個服務在儀表板上都顯示健康狀態。
      2. 開啟你部署時綁定的公開網域。
      3. 註冊第一個帳號 — 該帳號會成為 workspace 擁有者。
      4. (可選)將 [`toggl-cli`](https://github.com/CorrectRoadH/toggl-cli) 指向此實例,啟用 AI 驅動的時間追蹤。

      ## 自訂網域

      在 `opentoggl` 服務的 **Networking** 分頁中,可綁定你自己的網域。Web UI 也是可安裝的 PWA,iOS 與 Android 皆可加入主畫面。

      ## 升級

      若要升級,將 `opentoggl` 服務的 image tag 換成 [GHCR](https://github.com/CorrectRoadH/OpenTickly/pkgs/container/opentoggl) 上的新版本後重新部署即可。

      ## 授權與致謝

      OpenTickly 採用 [AGPL v3](https://www.gnu.org/licenses/agpl-3.0) 授權。
      原始碼:<https://github.com/CorrectRoadH/OpenTickly> · 官方網站:<https://opentoggl.com>。
      OpenTickly 的設計與 API 介面皆受 [Toggl](https://toggl.com) 啟發。

