    readme: |
      # OpenTickly di Zeabur

      [OpenTickly](https://github.com/CorrectRoadH/OpenTickly) adalah alternatif Toggl Track yang gratis, mengutamakan privasi, dan ramah AI. Data sepenuhnya milik Anda, alur kerja Toggl tetap, dan Anda hanya membayar untuk apa yang di-host.

      Template ini menyediakan semua yang dibutuhkan dalam satu klik:

      - **opentoggl** — image tunggal yang menyajikan UI web dan API di port 8080
      - **postgres** — PostgreSQL 17 sebagai penyimpanan utama, dengan volume persisten
      - **redis** — Redis 8 untuk cache dan antrian background job

      ## Setelah deploy

      1. Tunggu hingga ketiga service menampilkan status healthy di dashboard.
      2. Buka domain publik yang Anda bind saat deploy.
      3. Daftarkan akun pertama — akun ini menjadi pemilik workspace.
      4. (Opsional) Arahkan [`toggl-cli`](https://github.com/CorrectRoadH/toggl-cli) ke instance Anda untuk pelacakan waktu yang dibantu AI.

      ## Domain kustom

      Bind domain Anda sendiri di tab **Networking** pada service `opentoggl`. UI web juga merupakan PWA yang dapat dipasang di iOS dan Android.

      ## Pembaruan

      Untuk memperbarui, ubah tag image service `opentoggl` ke rilis terbaru dari [GHCR](https://github.com/CorrectRoadH/OpenTickly/pkgs/container/opentoggl) lalu deploy ulang.

      ## Lisensi & atribusi

      OpenTickly dilisensikan di bawah [AGPL v3](https://www.gnu.org/licenses/agpl-3.0).
      Kode sumber: <https://github.com/CorrectRoadH/OpenTickly> · Situs: <https://opentoggl.com>.
      Desain dan permukaan API OpenTickly terinspirasi dari [Toggl](https://toggl.com).
