services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: opentoggl
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - opentoggl-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d opentoggl"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  opentoggl:
    build:
      context: .
      dockerfile: docker/opentoggl.Dockerfile
    environment:
      OPENTOGGL_SERVICE_NAME: opentoggl
      PORT: 8080
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/opentoggl?sslmode=disable
      REDIS_URL: redis://redis:6379/0
      OPENTOGGL_FILESTORE_NAMESPACE: opentoggl
      OPENTOGGL_JOBS_QUEUE_NAME: default
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/readyz"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

volumes:
  opentoggl-postgres-data:
