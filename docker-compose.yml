name: opentoggl-self-hosted

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${OPENTOGGL_POSTGRES_DB:?set OPENTOGGL_POSTGRES_DB}
      POSTGRES_USER: ${OPENTOGGL_POSTGRES_USER:?set OPENTOGGL_POSTGRES_USER}
      POSTGRES_PASSWORD: ${OPENTOGGL_POSTGRES_PASSWORD:?set OPENTOGGL_POSTGRES_PASSWORD}
    ports:
      - "${OPENTOGGL_POSTGRES_PORT:-5432}:5432"
    volumes:
      - opentoggl-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${OPENTOGGL_POSTGRES_USER} -d ${OPENTOGGL_POSTGRES_DB}",
        ]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  opentoggl:
    image: ${OPENTOGGL_IMAGE:-opentoggl:local}
    build:
      context: .
      dockerfile: docker/opentoggl.Dockerfile
    environment:
      OPENTOGGL_SERVICE_NAME: opentoggl
      PORT: ${OPENTOGGL_PORT:-8080}
      DATABASE_URL: ${OPENTOGGL_DATABASE_URL:?set OPENTOGGL_DATABASE_URL}
      REDIS_URL: ${OPENTOGGL_REDIS_URL:?set OPENTOGGL_REDIS_URL}
      OPENTOGGL_FILESTORE_NAMESPACE: ${OPENTOGGL_FILESTORE_NAMESPACE:-opentoggl}
      OPENTOGGL_JOBS_QUEUE_NAME: ${OPENTOGGL_JOBS_QUEUE_NAME:-default}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${OPENTOGGL_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/readyz"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

volumes:
  opentoggl-postgres-data:
