#:schema node_modules/wrangler/config-schema.json
name = "opentoggl-update-worker"
main = "src/index.ts"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]

# Serves https://update.opentoggl.com/ — a single GET endpoint that proxies
# GitHub Releases + serves baked announcements. Deploy with `vp run update-worker#deploy`.
# Production domain is configured via Workers Custom Domains in the Cloudflare dashboard.

[observability]
enabled = true

# Analytics Engine dataset — one data point per request that has a valid
# instanceId + version query param. `recordUpdateRequest` guards on the binding,
# so the endpoint keeps working even if AE is ever disabled again.
#
# Schema (see src/analytics.ts):
#   indexes = [instance_id]
#   blobs   = [version, go_version, os, arch, locale, country]

[vars]
# Public repo whose releases feed latest + changelog. "owner/repo" format.
GITHUB_REPO = "CorrectRoadH/OpenTickly"

[env.production]
name = "opentoggl-update-worker"
vars = { GITHUB_REPO = "CorrectRoadH/OpenTickly" }

[[env.production.analytics_engine_datasets]]
binding = "UPDATE_REQUESTS"
dataset = "opentoggl_update_requests"

[env.staging]
name = "opentoggl-update-worker-staging"
vars = { GITHUB_REPO = "CorrectRoadH/OpenTickly" }

[[env.staging.analytics_engine_datasets]]
binding = "UPDATE_REQUESTS"
dataset = "opentoggl_update_requests_staging"
