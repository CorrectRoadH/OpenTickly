version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      actions:
        patterns:
          - "*"

  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      go-modules:
        patterns:
          - "*"

  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      npm-development:
        dependency-type: "development"
      npm-production:
        dependency-type: "production"

  - package-ecosystem: "npm"
    directory: "/apps/landing"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      npm-development:
        dependency-type: "development"
      npm-production:
        dependency-type: "production"
