version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      actions:
        patterns:
          - "*"

  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      go-modules:
        patterns:
          - "*"

  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    # vite-plus and @voidzero-dev/vite-plus-{core,test} are pinned together in
    # pnpm-workspace.yaml (catalog entries `vite:`, `vite-plus:`, `vitest:`).
    # They must be bumped as a set by hand — mismatched versions crash
    # rolldown napi, and Dependabot's per-package bumps also leave the lockfile
    # out of sync with the catalog, breaking CI.
    ignore:
      - dependency-name: "vite-plus"
      - dependency-name: "@voidzero-dev/vite-plus-core"
      - dependency-name: "@voidzero-dev/vite-plus-test"
    groups:
      npm-development:
        dependency-type: "development"
      npm-production:
        dependency-type: "production"

  - package-ecosystem: "npm"
    directory: "/apps/landing"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    ignore:
      - dependency-name: "vite-plus"
      - dependency-name: "@voidzero-dev/vite-plus-core"
      - dependency-name: "@voidzero-dev/vite-plus-test"
    groups:
      npm-development:
        dependency-type: "development"
      npm-production:
        dependency-type: "production"
