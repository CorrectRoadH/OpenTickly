name: Build and Push Landing Image

# Push-based deploy for the SaaS landing page on k3s.
#   main   -> :latest + :sha-<short> -> restart Deployment on ArgoCD
#   v*.*   -> semver tags (optional; main is the canonical deploy trigger)
#
# Required repo secrets:
#   TS_OAUTH_CLIENT_ID / TS_OAUTH_SECRET  — Tailscale OAuth client with tag:ci
#                                           (same pair as it-infra repo; must be
#                                           allowed to reach REDACTED.ts.net)
#   ARGOCD_AUTH_TOKEN                     — ArgoCD API token for account opentoggl-ci
#                                           (argocd account generate-token --account <user>)

on:
  push:
    branches: [main]
    paths:
      - "apps/landing/**"
      - "packages/**"
      - "Dockerfile.landing"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - ".github/workflows/docker-landing.yml"
    tags:
      - "v*"
  workflow_dispatch:

env:
  GHCR_REGISTRY: ghcr.io
  GHCR_IMAGE: correctroadh/opentoggl-landing

jobs:
  build-and-push:
    runs-on: ubuntu-24.04-arm      # 原生 arm64, 仅服务 k3s/opentoggl-saas
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.GHCR_REGISTRY }}/${{ env.GHCR_IMAGE }}
          tags: |
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-

      - uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile.landing
          platforms: linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=landing
          cache-to: type=gha,mode=max,scope=landing

  restart-on-argocd:
    # Only restart when pushing main; tag pushes are artefact-only.
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Connect to Tailnet
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Install ArgoCD CLI
        run: |
          curl -fsSL -o /tmp/argocd \
            https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64
          install -m 0755 /tmp/argocd /usr/local/bin/argocd

      - name: Restart opentoggl-landing deployment
        env:
          ARGOCD_AUTH_TOKEN: ${{ secrets.ARGOCD_AUTH_TOKEN }}
          ARGOCD_SERVER: REDACTED.ts.net
        run: |
          # selfHeal is on: pull the latest image by bouncing pods (image tag stays :latest)
          argocd app actions run opentoggl-saas restart \
            --grpc-web \
            --kind Deployment \
            --resource-name opentoggl-landing
