name: Build and Push Landing Image

# Push-based deploy for the SaaS landing page on k3s.
#   main   -> :latest + :sha-<short> -> restart Deployment on ArgoCD
#   v*.*   -> semver tags (optional; main is the canonical deploy trigger)
#
# Required repo secrets:
#   TS_OAUTH_CLIENT_ID / TS_OAUTH_SECRET  — Tailscale OAuth client with tag:ci
#                                           (must be allowed to reach ARGOCD_SERVER)
#   ARGOCD_SERVER                         — ArgoCD MagicDNS host on the tailnet
#   ARGOCD_AUTH_TOKEN                     — ArgoCD API token
#   GHCR_LANDING_IMAGE                    — GHCR image path (owner/repo)

on:
  push:
    branches: [main]
    paths:
      - "apps/landing/**"
      - "packages/**"
      - "Dockerfile.landing"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - ".github/workflows/docker-landing.yml"
    tags:
      - "v*"
  workflow_dispatch:

env:
  GHCR_REGISTRY: ghcr.io

jobs:
  build-and-push:
    # Native arm64 on a self-hosted runner (avoids GHA minute burn + QEMU slowness).
    runs-on: [self-hosted, linux, arm64]
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.GHCR_REGISTRY }}/${{ secrets.GHCR_LANDING_IMAGE }}
          tags: |
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-

      - uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile.landing
          platforms: linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=landing
          cache-to: type=gha,mode=max,scope=landing

  restart-on-argocd:
    # Only restart when pushing main; tag pushes are artefact-only.
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    # Self-hosted runner is already on the Tailnet, so the Tailscale action
    # and ArgoCD CLI install are no longer needed (argocd is preinstalled).
    runs-on: [self-hosted, linux, x64]
    steps:
      - name: Restart opentoggl-landing deployment
        env:
          ARGOCD_AUTH_TOKEN: ${{ secrets.ARGOCD_AUTH_TOKEN }}
          ARGOCD_SERVER: ${{ secrets.ARGOCD_SERVER }}
        run: |
          # selfHeal is on: pull the latest image by bouncing pods (image tag stays :latest)
          argocd app actions run opentoggl-saas restart \
            --grpc-web \
            --kind Deployment \
            --resource-name opentoggl-landing
