name: Build and Push Landing Image

# Image publishing for the SaaS landing page on k3s.
#   main   -> :latest + :sha-<short>
#   v*.*   -> semver tags (optional; main is the canonical deploy trigger)
#
# Deployment is GitOps-owned: argocd-image-updater in it-infra watches GHCR,
# writes the selected sha-* tag back to k3s/opentoggl-saas/kustomization.yaml,
# and ArgoCD syncs from Git. This workflow must not call ArgoCD directly.

on:
  push:
    branches: [main]
    paths:
      - "apps/landing/**"
      - "packages/**"
      - "Dockerfile.landing"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - ".github/workflows/docker-landing.yml"
    tags:
      - "v*"
  workflow_dispatch:

env:
  GHCR_REGISTRY: ghcr.io
  GHCR_LANDING_IMAGE: correctroadh/opentickly-landing

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-qemu-action@v4
        with:
          platforms: arm64

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.GHCR_REGISTRY }}/${{ env.GHCR_LANDING_IMAGE }}
          tags: |
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-

      - uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile.landing
          platforms: linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=landing
          cache-to: type=gha,mode=max,scope=landing
