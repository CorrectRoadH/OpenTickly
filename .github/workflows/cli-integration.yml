name: CLI Integration Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  cli-integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "pnpm"

      - name: Start postgres and redis
        run: |
          docker logout || true
          docker compose -f docker-compose.yml up -d postgres redis
          timeout 60 bash -c 'until docker compose -f docker-compose.yml exec -T postgres pg_isready -U postgres &>/dev/null && docker compose -f docker-compose.yml exec -T redis redis-cli ping &>/dev/null; do sleep 1; done'

      - name: Install dependencies
        run: pnpm install

      - name: Build backend
        env:
          CGO_ENABLED: 0
        run: go build -o /tmp/opentoggl ./apps/backend

      - name: Create database
        run: |
          docker compose -f docker-compose.yml exec -T postgres psql -U postgres -c "SELECT 1 FROM pg_database WHERE datname='opentoggl'" | grep -q 1 || docker compose -f docker-compose.yml exec -T postgres psql -U postgres -c "CREATE DATABASE opentoggl"

      - name: Start backend
        env:
          OPENTOGGL_SERVICE_NAME: opentoggl-api
          PORT: 8080
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/opentoggl?sslmode=disable
          REDIS_URL: redis://127.0.0.1:6379/0
          OPENTOGGL_FILESTORE_NAMESPACE: opentoggl
          OPENTOGGL_JOBS_QUEUE_NAME: default
        run: |
          /tmp/opentoggl &
          for i in {1..30}; do
            if curl -sf http://localhost:8080/readyz > /dev/null 2>&1; then
              echo "Backend is ready"
              break
            fi
            echo "Waiting for backend... ($i/30)"
            sleep 2
          done

      - name: Install toggl CLI
        run: npm install -g @correctroadh/toggl-cli

      - name: Run CLI integration tests
        env:
          OPENTOGGL_CLI_TEST_URL: http://127.0.0.1:8080/api/v9
          OPENTOGGL_CLI_TEST_BASE: http://127.0.0.1:8080
        run: pnpm run test:cli

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python SDK test dependencies
        working-directory: tests/python-sdk-integration/toggl-cli
        run: pip install -r requirements.txt -r test-requirements.txt

      - name: Run Python SDK integration tests
        working-directory: tests/python-sdk-integration
        env:
          OPENTOGGL_CLI_TEST_URL: http://127.0.0.1:8080/api/v9
          OPENTOGGL_CLI_TEST_BASE: http://127.0.0.1:8080
        run: python -m pytest -x -v
