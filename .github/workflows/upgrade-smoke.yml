name: Upgrade Smoke

on:
  workflow_dispatch:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  upgrade-smoke:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: opentoggl
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d opentoggl"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
      redis:
        image: redis:8-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    steps:
      - name: Checkout main (full history + tags)
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install pnpm (via npm, avoids @pnpm/exe bootstrap quirks from action-setup@v6)
        run: npm install -g pnpm@10.32.1

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      # ── Phase 1: v0.0.17 ────────────────────────────────────────────────────

      - name: Switch to v0.0.17 (clean worktree to avoid stale lockfiles)
        run: |
          git checkout -f v0.0.17
          git clean -fdx

      - name: Install dependencies (v0.0.17)
        run: pnpm install --frozen-lockfile

      - name: Build backend (v0.0.17)
        env:
          CGO_ENABLED: 0
        run: go build -o /tmp/opentoggl-v0.0.17 ./apps/backend

      - name: Install pgschema (required by v0.0.17)
        run: GOBIN=/usr/local/bin go install github.com/pgplex/pgschema@v1.7.3

      - name: Apply schema (v0.0.17)
        env:
          PORT: 8080
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/opentoggl?sslmode=disable
          REDIS_URL: redis://127.0.0.1:6379/0
        run: /tmp/opentoggl-v0.0.17 schema-apply

      - name: Build frontend (v0.0.17)
        run: pnpm --filter @opentickly/website run build

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium webkit

      - name: Start backend (v0.0.17)
        env:
          OPENTOGGL_SERVICE_NAME: opentoggl-api
          PORT: 8080
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/opentoggl?sslmode=disable
          REDIS_URL: redis://127.0.0.1:6379/0
          OPENTOGGL_FILESTORE_NAMESPACE: opentoggl
          OPENTOGGL_JOBS_QUEUE_NAME: default
        run: |
          /tmp/opentoggl-v0.0.17 &
          echo $! > /tmp/backend.pid
          for i in {1..30}; do
            curl -sf http://localhost:8080/readyz > /dev/null 2>&1 && echo "v0.0.17 backend ready" && break
            echo "Waiting for v0.0.17 backend... ($i/30)" && sleep 2
          done
          curl -sf http://localhost:8080/readyz || (echo "v0.0.17 backend failed to start" && exit 1)

      - name: Start frontend dev server (v0.0.17)
        env:
          OPENTOGGL_WEB_PROXY_TARGET: http://127.0.0.1:8080
        run: |
          pnpm exec vp run website#dev -- --port 5173 &
          echo $! > /tmp/frontend.pid
          for i in {1..30}; do
            curl -sf http://localhost:5173 > /dev/null 2>&1 && echo "v0.0.17 frontend ready" && break
            echo "Waiting for v0.0.17 frontend... ($i/30)" && sleep 2
          done

      - name: Run e2e against v0.0.17 (seed data; failures here don't block upgrade)
        run: |
          cd apps/website
          pnpm exec playwright test || echo "⚠ v0.0.17 e2e had failures — continuing to upgrade phase"

      - name: Stop v0.0.17 backend and frontend
        run: |
          kill $(cat /tmp/backend.pid) 2>/dev/null || true
          kill $(cat /tmp/frontend.pid) 2>/dev/null || true
          for i in {1..10}; do
            lsof -ti:8080 | xargs kill -9 2>/dev/null || true
            nc -z localhost 8080 2>/dev/null || break
            sleep 1
          done
          lsof -ti:5173 | xargs kill -9 2>/dev/null || true

      # ── Phase 2: main (migrate.Run fires on startup) ─────────────────────────

      - name: Switch back to main (clean worktree to avoid stale lockfiles)
        run: |
          git checkout -f main
          git clean -fdx
          pnpm store prune || true

      - name: Install dependencies (main)
        run: pnpm install --frozen-lockfile

      - name: Build backend (main)
        env:
          CGO_ENABLED: 0
        run: go build -o /tmp/opentoggl-main ./apps/backend

      - name: Build frontend (main)
        run: pnpm --filter @opentickly/website run build

      - name: Start backend (main)
        env:
          OPENTOGGL_SERVICE_NAME: opentoggl-api
          PORT: 8080
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/opentoggl?sslmode=disable
          REDIS_URL: redis://127.0.0.1:6379/0
          OPENTOGGL_FILESTORE_NAMESPACE: opentoggl
          OPENTOGGL_JOBS_QUEUE_NAME: default
        run: |
          /tmp/opentoggl-main > /tmp/backend-main.log 2>&1 &
          echo $! > /tmp/backend.pid
          for i in {1..30}; do
            curl -sf http://localhost:8080/readyz > /dev/null 2>&1 && echo "main backend ready" && break
            echo "Waiting for main backend... ($i/30)" && sleep 2
          done
          curl -sf http://localhost:8080/readyz || (echo "main backend failed to start after migration" && exit 1)

      - name: Start frontend dev server (main)
        env:
          OPENTOGGL_WEB_PROXY_TARGET: http://127.0.0.1:8080
        run: |
          pnpm exec vp run website#dev -- --port 5173 &
          for i in {1..30}; do
            curl -sf http://localhost:5173 > /dev/null 2>&1 && echo "main frontend ready" && break
            echo "Waiting for main frontend... ($i/30)" && sleep 2
          done

      - name: Run e2e against main (DB migrated from v0.0.17)
        run: |
          cd apps/website
          pnpm exec playwright test

      - name: Upload traces and backend log on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: upgrade-smoke-traces
          path: |
            apps/website/test-results/
            /tmp/backend-main.log
          retention-days: 7
