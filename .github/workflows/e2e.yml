name: E2E Tests

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pull-requests: read

jobs:
  e2e:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: opentoggl
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d opentoggl"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
      redis:
        image: redis:8-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check changed files
        id: changes
        uses: dorny/paths-filter@v4
        with:
          filters: |
            website-e2e:
              - 'apps/website/**'
              - 'apps/backend/**'
              - 'packages/**'
              - 'lib/**'
              - 'openapi/**'
              - 'tests/**'
              - '.github/workflows/e2e.yml'
              - 'go.mod'
              - 'go.sum'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'tsconfig.json'
              - 'vite.config.ts'
              - '.env.example'
              - '.air.toml'

      - uses: pnpm/action-setup@v6
        if: github.event_name == 'workflow_dispatch' || steps.changes.outputs.website-e2e == 'true'

      - uses: actions/setup-node@v6
        if: github.event_name == 'workflow_dispatch' || steps.changes.outputs.website-e2e == 'true'
        with:
          node-version: 24
          cache: "pnpm"

      - name: Install dependencies
        if: github.event_name == 'workflow_dispatch' || steps.changes.outputs.website-e2e == 'true'
        run: pnpm install

      - name: Build backend
        if: github.event_name == 'workflow_dispatch' || steps.changes.outputs.website-e2e == 'true'
        env:
          CGO_ENABLED: 0
        run: go build -o /tmp/opentoggl ./apps/backend

      - name: Build frontend
        if: github.event_name == 'workflow_dispatch' || steps.changes.outputs.website-e2e == 'true'
        run: pnpm --filter @opentickly/website run build

      - name: Install Playwright browsers
        if: github.event_name == 'workflow_dispatch' || steps.changes.outputs.website-e2e == 'true'
        run: pnpm exec playwright install --with-deps chromium webkit

      - name: Start backend
        if: github.event_name == 'workflow_dispatch' || steps.changes.outputs.website-e2e == 'true'
        env:
          OPENTOGGL_SERVICE_NAME: opentoggl-api
          PORT: 8080
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/opentoggl?sslmode=disable
          REDIS_URL: redis://127.0.0.1:6379/0
          OPENTOGGL_FILESTORE_NAMESPACE: opentoggl
          OPENTOGGL_JOBS_QUEUE_NAME: default
        run: |
          /tmp/opentoggl &
          sleep 5

      - name: Wait for backend to be ready
        if: github.event_name == 'workflow_dispatch' || steps.changes.outputs.website-e2e == 'true'
        run: |
          for i in {1..30}; do
            if curl -sf http://localhost:8080/readyz > /dev/null 2>&1; then
              echo "Backend is ready"
              exit 0
            fi
            echo "Waiting for backend... ($i/30)"
            sleep 2
          done
          echo "Backend failed to start"
          exit 1

      - name: Start frontend dev server
        if: github.event_name == 'workflow_dispatch' || steps.changes.outputs.website-e2e == 'true'
        env:
          OPENTOGGL_WEB_PROXY_TARGET: http://127.0.0.1:8080
        run: |
          pnpm exec vp run website#dev -- --port 5173 &
          sleep 5

      - name: Run E2E tests
        if: github.event_name == 'workflow_dispatch' || steps.changes.outputs.website-e2e == 'true'
        run: |
          cd apps/website
          pnpm exec playwright test

      - name: Skip E2E tests
        if: github.event_name != 'workflow_dispatch' && steps.changes.outputs.website-e2e != 'true'
        run: echo "Skipping website E2E because this change does not touch website, backend, shared runtime, OpenAPI, dependency, or E2E workflow files."
