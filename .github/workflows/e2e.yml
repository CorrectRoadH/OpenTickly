name: E2E Tests

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  e2e:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: opentoggl
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d opentoggl"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
      redis:
        image: redis:8-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Build backend
        env:
          CGO_ENABLED: 0
        run: go build -o /tmp/opentoggl ./apps/backend

      - name: Build frontend
        run: pnpm --filter @opentoggl/website run build

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium webkit

      - name: Start backend
        env:
          OPENTOGGL_SERVICE_NAME: opentoggl-api
          PORT: 8080
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/opentoggl?sslmode=disable
          REDIS_URL: redis://127.0.0.1:6379/0
          OPENTOGGL_FILESTORE_NAMESPACE: opentoggl
          OPENTOGGL_JOBS_QUEUE_NAME: default
        run: |
          /tmp/opentoggl &
          sleep 5

      - name: Wait for backend to be ready
        run: |
          for i in {1..30}; do
            if curl -sf http://localhost:8080/readyz > /dev/null 2>&1; then
              echo "Backend is ready"
              exit 0
            fi
            echo "Waiting for backend... ($i/30)"
            sleep 2
          done
          echo "Backend failed to start"
          exit 1

      - name: Start frontend dev server
        env:
          OPENTOGGL_WEB_PROXY_TARGET: http://127.0.0.1:8080
        run: |
          pnpm exec vp run website#dev -- --port 5173 &
          sleep 5

      - name: Run E2E tests
        run: |
          cd apps/website
          pnpm exec playwright test
