root = "."
testdata_dir = "testdata"
tmp_dir = "dist/air"

[build]
cmd = "go build -o ./dist/air/opentoggl-backend ./apps/backend"
delay = 500
entrypoint = "./dist/air/opentoggl-backend"
exclude_dir = ["dist", "node_modules", "docs", ".git", ".agent", ".agents", ".codex", ".claude"]
exclude_file = []
exclude_regex = ["_test\\.go$"]
include_dir = ["apps/backend"]
include_ext = ["go", "tpl", "tmpl", "html"]
kill_delay = "0s"
log = "build-errors.log"
send_interrupt = true
stop_on_error = true

[color]
app = "green"
build = "yellow"
main = "magenta"
runner = "cyan"
watcher = "blue"

[log]
main_only = false

[misc]
clean_on_exit = true
